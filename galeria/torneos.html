<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería — Torneos | AMMDK TREZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1B5E20;--green2:#2E7D32;--gold:#C9963A;--dark:#0D0D0D;--dark2:#141414;--text:#F0EDE6;--muted:#9E9E9E;--border:rgba(201,150,58,0.2);--font-head:'Oswald',sans-serif;--font-body:'Source Sans 3',sans-serif;}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--dark);color:var(--text);overflow-x:hidden;padding-top:64px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--green2);border-radius:3px}
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(13,13,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-container{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;height:64px}
.nav-back{font-family:var(--font-head);font-size:11px;letter-spacing:2px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color 0.2s}
.nav-back:hover{color:var(--gold)}
.nav-divider{width:1px;height:20px;background:var(--border)}
.nav-title{font-family:var(--font-head);font-size:13px;letter-spacing:2px;color:var(--text)}
.nav-tag{font-family:var(--font-head);font-size:10px;letter-spacing:2px;color:var(--gold);margin-left:auto;background:rgba(201,150,58,0.1);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
.section-header{padding:40px 32px 28px;max-width:1200px;margin:0 auto}
.section-tag{font-family:var(--font-head);font-size:11px;letter-spacing:4px;color:var(--gold);display:block;margin-bottom:8px}
.section-title{font-family:var(--font-head);font-size:34px;font-weight:700;letter-spacing:2px;color:var(--text);margin-bottom:6px}
.section-title span{color:var(--gold)}
.section-desc{color:var(--muted);font-size:14px}
.section-divider{width:50px;height:3px;background:linear-gradient(90deg,var(--green2),var(--gold));margin-top:14px;border-radius:2px}
.gallery-container{max-width:1200px;margin:0 auto;padding:0 32px 80px}
.layout-b{display:grid;grid-template-columns:2fr 3fr;gap:4px;min-height:560px}
.protagonista{position:relative;overflow:hidden;cursor:pointer}
.protagonista img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)}
.protagonista:hover img{transform:scale(1.04)}
.prot-badge{position:absolute;top:16px;left:20px;font-family:var(--font-head);font-size:9px;letter-spacing:3px;color:var(--gold);background:rgba(13,13,13,0.8);border:1px solid rgba(201,150,58,0.4);padding:4px 10px;border-radius:12px;z-index:1}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 50%);pointer-events:none}
.label{position:absolute;bottom:14px;left:16px;font-family:var(--font-head);font-size:12px;letter-spacing:1.5px;color:white;z-index:1}
.expand{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(0,0,0,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s;z-index:2;cursor:pointer}
.protagonista:hover .expand,.img-wrap:hover .expand,.ancha:hover .expand{opacity:1}
.expand i{color:white;font-size:11px}
.right-col{display:flex;flex-direction:column;gap:4px}
.top-pair{display:grid;grid-template-columns:1fr 1fr;gap:4px;height:240px}
.img-wrap{position:relative;overflow:hidden;cursor:pointer}
.img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)}
.img-wrap:hover img{transform:scale(1.06)}
.ancha{position:relative;overflow:hidden;cursor:pointer;height:240px}
.ancha img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s}
.ancha:hover img{transform:scale(1.04)}
.ancha-badge{position:absolute;top:12px;right:12px;font-family:var(--font-head);font-size:9px;letter-spacing:2px;color:var(--gold);background:rgba(13,13,13,0.75);border:1px solid rgba(201,150,58,0.3);padding:3px 8px;border-radius:10px;z-index:1}
.row-label{font-family:var(--font-head);font-size:10px;letter-spacing:3px;color:rgba(201,150,58,0.5);margin:20px 0 8px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.grid-6 .img-wrap{aspect-ratio:3/2}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.lightbox.active{display:flex}
.lightbox-inner{max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:16px}
.lightbox img{max-height:80vh;max-width:88vw;object-fit:contain;border-radius:6px}
.lightbox-label{font-family:var(--font-head);font-size:13px;letter-spacing:2px;color:var(--gold);text-align:center}
.lightbox-close{position:fixed;top:20px;right:28px;font-size:28px;color:white;cursor:pointer;background:none;border:none;opacity:0.7;z-index:10000}
.lightbox-close:hover{opacity:1}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:none;color:white;font-size:20px;width:48px;height:48px;border-radius:50%;cursor:pointer;z-index:10000}
.lightbox-nav:hover{background:rgba(201,150,58,0.3)}
.lb-prev{left:16px}.lb-next{right:16px}
.gal-footer{text-align:center;padding:32px;border-top:1px solid var(--border)}
.gal-footer a{font-family:var(--font-head);font-size:11px;letter-spacing:2px;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:color 0.2s}
.gal-footer a:hover{color:var(--gold)}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-back"><i class="fas fa-arrow-left"></i> AMMDK TREZ</a>
    <div class="nav-divider"></div>
    <span class="nav-title">GALERÍA</span>
    <span class="nav-tag">TORNEOS OFICIALES</span>
  </div>
</nav>
<div class="section-header">
  <span class="section-tag">Galería Oficial AMMDK TREZ</span>
  <h1 class="section-title">Torneos <span>Oficiales</span></h1>
  <p class="section-desc">Competencias regionales de Kyorugi y Poomsae — Zona TREZ · Auditorio Zonkeys, Tijuana</p>
  <div class="section-divider"></div>
</div>
<div class="gallery-container">
  <div class="layout-b">
    <div class="protagonista" onclick="openLB(0)">
      <span class="prot-badge">PROTAGONISTA</span>
      <img src="fotos/torneos/Lateral.jpg" alt="Ti Chagui Lateral">
      <div class="overlay"></div>
      <div class="expand"><i class="fas fa-expand"></i></div>
    </div>
    <div class="right-col">
      <div class="top-pair">
        <div class="img-wrap" onclick="openLB(1)"><img src="fotos/torneos/Maestros Saludo a la Bandera.jpg" alt="Maestros Saludo"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
        <div class="img-wrap" onclick="openLB(2)"><img src="fotos/torneos/Intercambio niños.jpg" alt="Intercambio Niños"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
      </div>
      <div class="ancha" onclick="openLB(3)">
        <span class="ancha-badge">ANCHA · 2 COLS</span>
        <img src="fotos/torneos/Medallas.jpg" alt="Medallas">
        <div class="overlay"></div>
        <div class="expand"><i class="fas fa-expand"></i></div>
      </div>
    </div>
  </div>
  
  <div class="grid-6">
    <div class="img-wrap" onclick="openLB(4)"><img src="fotos/torneos/Formas 2do poom.jpg" alt="Formas 2do Poom"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
    <div class="img-wrap" onclick="openLB(5)"><img src="fotos/torneos/Ninos Forma ieby.jpg" alt="Niños Formas"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
    <div class="img-wrap" onclick="openLB(6)"><img src="fotos/torneos/Ti Chagui.jpg" alt="Ti Chagui"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
    <div class="img-wrap" onclick="openLB(7)"><img src="fotos/torneos/Yop Chagui.jpg" alt="Yop Chagui"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
    <div class="img-wrap" onclick="openLB(8)"><img src="fotos/torneos/Ti Chagui niño.jpg" alt="Ti Chagui Niño"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
    <div class="img-wrap" onclick="openLB(9)"><img src="fotos/torneos/Dolyio niño.jpg" alt="Dolyo Niño"><div class="overlay"></div><div class="expand"><i class="fas fa-expand"></i></div></div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLB()">
  <button class="lightbox-close" onclick="closeLB()">✕</button>
  <button class="lightbox-nav lb-prev" onclick="event.stopPropagation();navLB(-1)"><i class="fas fa-chevron-left"></i></button>
  <button class="lightbox-nav lb-next" onclick="event.stopPropagation();navLB(1)"><i class="fas fa-chevron-right"></i></button>
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt=""><div class="lightbox-label" id="lb-label"></div>
  </div>
</div>
<div class="gal-footer"><a href="../index.html#galeria"><i class="fas fa-arrow-left"></i> Volver a Galería</a></div>
<script>
const FOTOS=[
  {src:'fotos/torneos/Lateral.jpg',label:'Ti Chagui · Lateral · Tijuana'},
  {src:'fotos/torneos/Maestros Saludo a la Bandera.jpg',label:'Maestros · Saludo Bandera'},
  {src:'fotos/torneos/Intercambio niños.jpg',label:'Intercambio · Niños · Árbitro'},
  {src:'fotos/torneos/Medallas.jpg',label:'Medallas · Festival Primavera'},
  {src:'fotos/torneos/Formas 2do poom.jpg',label:'Formas · 2do Poom'},
  {src:'fotos/torneos/Ninos Forma ieby.jpg',label:'Niños · Formas'},
  {src:'fotos/torneos/Ti Chagui.jpg',label:'Ti Chagui · Adultos'},
  {src:'fotos/torneos/Yop Chagui.jpg',label:'Yop Chagui'},
  {src:'fotos/torneos/Ti Chagui niño.jpg',label:'Ti Chagui · Niño'},
  {src:'fotos/torneos/Dolyio niño.jpg',label:'Dolyo · Niño'},
];
let cur=0;
function openLB(i){cur=i;document.getElementById('lb-img').src=FOTOS[i].src;document.getElementById('lb-label').textContent=FOTOS[i].label;document.getElementById('lightbox').classList.add('active');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('lightbox').classList.remove('active');document.body.style.overflow='';}
function navLB(d){cur=(cur+d+FOTOS.length)%FOTOS.length;openLB(cur);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')navLB(-1);if(e.key==='ArrowRight')navLB(1);});
</script>
</body>
</html>
